name: AlineaAmountEntry
options:
  bundleIdPrefix: com.valikhim
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  AlineaAmountEntry:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AlineaAmountEntry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valikhim.AlineaAmountEntry
        PRODUCT_NAME: AlineaAmountEntry
        INFOPLIST_FILE: AlineaAmountEntry/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
  AlineaAmountEntryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AlineaAmountEntryTests
    dependencies:
      - target: AlineaAmountEntry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valikhim.AlineaAmountEntryTests
        GENERATE_INFOPLIST_FILE: YES
  AlineaAmountEntryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AlineaAmountEntryUITests
      # Shared accessibility-identifier namespace, compiled into both the app
      # and the UI-test target so a rename is a compile error, not a flaky test.
      - path: AlineaAmountEntry/Sources/Utilities/A11y.swift
    dependencies:
      - target: AlineaAmountEntry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valikhim.AlineaAmountEntryUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: AlineaAmountEntry
schemes:
  AlineaAmountEntry:
    build:
      targets:
        AlineaAmountEntry: all
        AlineaAmountEntryTests: [test]
        AlineaAmountEntryUITests: [test]
    test:
      targets:
        - AlineaAmountEntryTests
        - name: AlineaAmountEntryUITests
          skippedTests:
            # Demo recording is paced with sleeps; run it explicitly via
            # -only-testing rather than in the default suite.
            - DemoRecordingTests
      gatherCoverageData: true
