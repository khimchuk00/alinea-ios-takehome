name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi

      - name: Versions
        run: xcodebuild -version && swift --version

      - name: Build & test (Swift 6)
        run: |
          set -o pipefail
          xcodebuild test \
            -project AlineaAmountEntry.xcodeproj \
            -scheme AlineaAmountEntry \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO
